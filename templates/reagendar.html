<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reagendar Consulta - Clínica Veterinária</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page-shell">
        <header class="page-header">
            <h1>Reagendar Consulta</h1>
            <p class="page-subtitle">Você pode alterar apenas o motivo, a data e o horário da consulta.</p>
        </header>

        {% if erro %}
            <p class="error-message">{{ erro }}</p>
        {% endif %}

        <section class="page-card">
            <form action="{{ url_for('reagendar_salvar', id=agendamento.id) }}" method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label for="nome_dono">Nome do Tutor:</label>
        <input type="text" id="nome_dono" value="{{ agendamento.nome_dono }}" readonly>

        <label for="nome_pet">Nome do Pet:</label>
        <input type="text" id="nome_pet" value="{{ agendamento.nome_pet }}" readonly>

        <label for="especie">Espécie:</label>
        <input type="text" id="especie" value="{{ agendamento.especie }}" readonly>

        <label for="sexo">Sexo:</label>
        <input type="text" id="sexo" value="{{ agendamento.sexo }}" readonly>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" value="{{ agendamento.telefone }}" readonly>

        <label for="doutora">Doutora:</label>
        <input type="text" id="doutora" value="{{ agendamento.doutora }}" readonly>

        <label for="servico">Serviço:</label>
        <input type="text" id="servico" value="{{ agendamento.servico }}" readonly>

        <label for="data_consulta">Data da Consulta:</label>
        <input type="date" id="data_consulta" name="data_consulta" value="{{ data_consulta }}" required>

        <label for="horario_consulta">Horário:</label>
        <select id="horario_consulta" name="horario_consulta" required disabled>
            <option value="">Carregando horários...</option>
        </select>
        <p id="horario_info" class="helper-message">Os horários disponíveis são atualizados automaticamente.</p>

        <input type="hidden" id="data" name="data" required>

        <label for="motivo">Motivo da Consulta:</label>
        <textarea id="motivo" name="motivo" placeholder="Descreva o motivo da consulta..." required>{{ request.form.get('motivo', agendamento.motivo) }}</textarea>

        <button type="submit">Salvar Reagendamento</button>
        <a href="{{ url_for('painel') }}" class="button secondary-button">Voltar para o painel</a>
            </form>
        </section>
    </main>

    <script>
        const dataInput = document.getElementById('data_consulta');
        const horarioSelect = document.getElementById('horario_consulta');
        const dataHidden = document.getElementById('data');
        const horarioInfo = document.getElementById('horario_info');
        const form = document.querySelector('form');

        const doutora = {{ agendamento.doutora|tojson }};
        const agendamentoId = {{ agendamento.id }};
        const horarioInicial = {{ horario_consulta|tojson }};

        function atualizarDataOculta() {
            if (dataInput.value && horarioSelect.value) {
                dataHidden.value = `${dataInput.value}T${horarioSelect.value}`;
            } else {
                dataHidden.value = '';
            }
        }

        function definirMensagemHorario(mensagem) {
            horarioInfo.textContent = mensagem;
        }

        async function carregarHorariosDisponiveis() {
            const data = dataInput.value;

            horarioSelect.innerHTML = '';
            horarioSelect.disabled = true;
            atualizarDataOculta();

            if (!data) {
                horarioSelect.innerHTML = '<option value="">Selecione uma data primeiro</option>';
                definirMensagemHorario('Selecione uma data para ver os horários disponíveis.');
                return;
            }

            try {
                const resposta = await fetch(`/horarios-disponiveis?doutora=${encodeURIComponent(doutora)}&data=${encodeURIComponent(data)}&agendamento_id=${agendamentoId}`);
                const payload = await resposta.json();

                if (!resposta.ok) {
                    horarioSelect.innerHTML = '<option value="">Não foi possível carregar horários</option>';
                    definirMensagemHorario(payload.erro || 'Erro ao buscar horários.');
                    return;
                }

                if (!payload.horarios || payload.horarios.length === 0) {
                    horarioSelect.innerHTML = '<option value="">Sem horários disponíveis</option>';
                    definirMensagemHorario('Não há horários livres para esta data.');
                    return;
                }

                horarioSelect.innerHTML = '<option value="">Selecione um horário</option>';
                for (const horario of payload.horarios) {
                    const option = document.createElement('option');
                    option.value = horario;
                    option.textContent = horario;
                    horarioSelect.appendChild(option);
                }

                if (data === {{ data_consulta|tojson }} && horarioInicial) {
                    horarioSelect.value = horarioInicial;
                }

                horarioSelect.disabled = false;
                atualizarDataOculta();
                definirMensagemHorario('Escolha um dos horários disponíveis abaixo.');
            } catch (erro) {
                horarioSelect.innerHTML = '<option value="">Erro ao carregar horários</option>';
                definirMensagemHorario('Falha de conexão ao buscar horários.');
            }
        }

        const hoje = new Date().toISOString().split('T')[0];
        dataInput.min = hoje;

        dataInput.addEventListener('change', carregarHorariosDisponiveis);
        horarioSelect.addEventListener('change', atualizarDataOculta);

        form.addEventListener('submit', function (event) {
            atualizarDataOculta();
            if (!dataHidden.value) {
                event.preventDefault();
                definirMensagemHorario('Selecione data e horário antes de salvar o reagendamento.');
            }
        });

        carregarHorariosDisponiveis();
    </script>
</body>
</html>
