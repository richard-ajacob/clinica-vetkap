<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - VetKap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page-shell">
        <div class="site-logo-bar">
            <img src="{{ url_for('static', filename='img/logo.png') }}?v=2" alt="VetKap – Clínica Veterinária">
        </div>
        <header class="page-header">
            <h1>Agendamento - VetKap</h1>
            <p class="page-subtitle">Preencha os dados abaixo para registrar a consulta do seu pet em poucos passos.</p>
        </header>

        {% if erro %}
            <p class="error-message">{{ erro }}</p>
        {% endif %}

        <section class="page-card">
            <form action="/agendar" method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label for="nome_dono">Nome do Tutor:</label>
        <input type="text" id="nome_dono" name="nome_dono" required>
        
        <label for="nome_pet">Nome do Pet:</label>
        <input type="text" id="nome_pet" name="nome_pet" required>
        
        <label>Espécie:</label>
        <div class="radio-group">
            <label class="radio-option" for="especie_canino">
                <input type="radio" id="especie_canino" name="especie" value="Canino" required>
                Canino
            </label>
            <label class="radio-option" for="especie_felino">
                <input type="radio" id="especie_felino" name="especie" value="Felino" required>
                Felino
            </label>
        </div>
        
        <label>Sexo:</label>
        <div class="radio-group">
            <label class="radio-option" for="sexo_macho">
                <input type="radio" id="sexo_macho" name="sexo" value="Macho" required>
                Macho
            </label>
            <label class="radio-option" for="sexo_femea">
                <input type="radio" id="sexo_femea" name="sexo" value="Fêmea" required>
                Fêmea
            </label>
        </div>
        
        <label for="telefone">Telefone (DDD):</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX ou XXXXXXXXXXX" pattern="^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$" title="Use o formato (XX) XXXXX-XXXX ou XXXXXXXXXXX" required>
        
        <label for="doutora">Doutora:</label>
        <select id="doutora" name="doutora" required>
            <option value="Bruna Prudêncio">Bruna Prudêncio</option>
            <option value="Karina Pereira">Karina Pereira</option>
            <option value="Sara Thevenard">Sara Thevenard</option>
        </select>

        <label for="data_consulta">Data da Consulta:</label>
        <input type="date" id="data_consulta" name="data_consulta" required>

        <label for="horario_consulta">Horário:</label>
        <select id="horario_consulta" name="horario_consulta" required disabled>
            <option value="">Selecione a doutora e a data primeiro</option>
        </select>
        <p id="horario_info" class="helper-message">Os horários disponíveis são atualizados automaticamente.</p>
        <input type="hidden" id="data" name="data" required>
        
        <label for="servico">Serviço:</label>
        <select id="servico" name="servico" required>
            <option value="Consulta">Consulta</option>
        </select>
        
        <label for="motivo">Motivo da Consulta:</label>
        <textarea id="motivo" name="motivo" placeholder="Descreva o motivo da consulta..." required></textarea>
        
        <button type="submit">Agendar</button>
            </form>
        </section>
    </main>

    <script>
        const doutoraSelect = document.getElementById('doutora');
        const dataInput = document.getElementById('data_consulta');
        const horarioSelect = document.getElementById('horario_consulta');
        const dataHidden = document.getElementById('data');
        const horarioInfo = document.getElementById('horario_info');
        const form = document.querySelector('form');

        function atualizarDataOculta() {
            if (dataInput.value && horarioSelect.value) {
                dataHidden.value = `${dataInput.value}T${horarioSelect.value}`;
            } else {
                dataHidden.value = '';
            }
        }

        function definirMensagemHorario(mensagem) {
            horarioInfo.textContent = mensagem;
        }

        async function carregarHorariosDisponiveis() {
            const doutora = doutoraSelect.value;
            const data = dataInput.value;

            horarioSelect.innerHTML = '';
            horarioSelect.disabled = true;
            atualizarDataOculta();

            if (!doutora || !data) {
                horarioSelect.innerHTML = '<option value="">Selecione a doutora e a data primeiro</option>';
                definirMensagemHorario('Os horários disponíveis são atualizados automaticamente.');
                return;
            }

            try {
                const resposta = await fetch(`/horarios-disponiveis?doutora=${encodeURIComponent(doutora)}&data=${encodeURIComponent(data)}`);
                const payload = await resposta.json();

                if (!resposta.ok) {
                    horarioSelect.innerHTML = '<option value="">Não foi possível carregar horários</option>';
                    definirMensagemHorario(payload.erro || 'Erro ao buscar horários.');
                    return;
                }

                if (!payload.horarios || payload.horarios.length === 0) {
                    horarioSelect.innerHTML = '<option value="">Sem horários disponíveis</option>';
                    definirMensagemHorario('Não há horários livres para esta data. Tente outra data ou doutora.');
                    return;
                }

                horarioSelect.innerHTML = '<option value="">Selecione um horário</option>';
                for (const horario of payload.horarios) {
                    const option = document.createElement('option');
                    option.value = horario;
                    option.textContent = horario;
                    horarioSelect.appendChild(option);
                }

                horarioSelect.disabled = false;
                definirMensagemHorario('Escolha um dos horários disponíveis abaixo.');
            } catch (erro) {
                horarioSelect.innerHTML = '<option value="">Erro ao carregar horários</option>';
                definirMensagemHorario('Falha de conexão ao buscar horários.');
            }
        }

        const hoje = new Date().toISOString().split('T')[0];
        dataInput.min = hoje;

        doutoraSelect.addEventListener('change', carregarHorariosDisponiveis);
        dataInput.addEventListener('change', carregarHorariosDisponiveis);
        horarioSelect.addEventListener('change', atualizarDataOculta);

        form.addEventListener('submit', function (event) {
            atualizarDataOculta();
            if (!dataHidden.value) {
                event.preventDefault();
                definirMensagemHorario('Selecione uma data e um horário disponível antes de agendar.');
            }
        });
    </script>
</body>
</html>
